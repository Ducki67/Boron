name: Build Boron

on: [ "push", "pull_request" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile Boron
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: msbuild . /t:Build /p:Configuration=Release

      - name: Upload Compiled Boron DLL
        uses: actions/upload-artifact@v4
        with:
          name: Boron
          path: |
            ./x64/Release/Boron.dll
            ./x64/Release/Boron.pdb
          if-no-files-found: warn
          retention-days: 90

      - name: Upload Compiled BoronClient DLL
        uses: actions/upload-artifact@v4
        with:
          name: BoronClient
          path: |
            ./x64/Release/BoronClient.dll
            ./x64/Release/BoronClient.pdb
          if-no-files-found: warn
          retention-days: 90

      - name: Publish Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Boron build ${{ github.run_number }}
          body: Automated build of commit ${{ github.sha }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false
          files: |
            ./x64/Release/Boron.dll
            ./x64/Release/Boron.pdb
            ./x64/Release/BoronClient.dll
            ./x64/Release/BoronClient.pdb
